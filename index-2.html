<!doctype html>
<html lang="en">
    <head>
        <title>Symptom Tracker</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./src/index-2.css">
    </head>
    <body>
        <main>
            <h1>Symptom Levels Today</h1>

            <div class="symptom-container">
                <div class="symptom-name-status">
                    <span>Fatigue</span>
                    <span class="status">95%</span>
                </div>

                <div class="symptom-status-bar">
                    <div class="status-indicator status-95"></div>
                </div>
            </div>

            <div class="symptom-container">
                <div class="symptom-name-status">
                    <span>Brain Fog</span>
                    <span class="status">85%</span>
                </div>

                <div class="symptom-status-bar">
                    <div class="status-indicator status-85"></div>
                </div>
            </div>

            <!-- Progress container -->
            <div class="symptom-container">
                <div class="symptom-name-status">
                    <span>Muscle Weakness</span>
                    <span class="status">50%</span>
                </div>

                <div class="symptom-status-bar">
                    <div class="status-indicator status-50"></div>
                </div>
            </div>
        </main>
    </body>
</html>
