<!doctype html>
<html lang="en">
    <head>
        <title>Symptom Tracker</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./src/index-2.css">
    </head>
    <body>
        <main>
            <h1>Symptom Levels Today</h1>

            <!-- Progress container -->
            <div class="prog-container">
                <div class="prog-info">
                    <span>Fatigue</span>
                    <span class="status">33%</span>
                </div>

                <div class="prog-bar">
                    <div class="prog-indicator prog-33"></div>
                </div>
            </div>

            <!-- Progress container -->
            <div class="prog-container">
                <div class="prog-info">
                    <span>Brain Fog</span>
                    <span class="status">60%</span>
                </div>

                <div class="prog-bar">
                    <div class="prog-indicator prog-60"></div>
                </div>
            </div>

            <!-- Progress container -->
            <div class="prog-container">
                <div class="prog-info">
                    <span>Muscle Weakness</span>
                    <span class="status">90%</span>
                </div>

                <div class="prog-bar">
                    <div class="prog-indicator prog-90"></div>
                </div>
            </div>
        </main>
    </body>
</html>
